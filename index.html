<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POPKID VCF | Premium Project</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.8/css/intlTelInput.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --ios-blue: #007AFF;
            --glass: rgba(255, 255, 255, 0.08);
            --border: rgba(255, 255, 255, 0.15);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
            background: #000;
            background-image: radial-gradient(at 0% 0%, #1a1a2e 0, transparent 50%), 
                              radial-gradient(at 100% 100%, #0d0d1a 0, transparent 50%);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .card {
            background: var(--glass);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            border: 1px solid var(--border);
            border-radius: 35px;
            padding: 40px 25px;
            width: 100%;
            max-width: 420px;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.7);
            position: relative;
            z-index: 10;
        }

        h1 { font-size: 32px; font-weight: 800; margin-bottom: 5px; letter-spacing: -1px; }
        .sub { color: #8E8E93; font-size: 14px; margin-bottom: 25px; }

        .progress-box { background: rgba(255,255,255,0.03); padding: 20px; border-radius: 25px; margin-bottom: 25px; border: 1px solid rgba(255,255,255,0.05); }
        .bar-bg { background: #1c1c1e; height: 10px; border-radius: 5px; overflow: hidden; margin-top: 10px; }
        #progress-bar { width: 0%; height: 100%; background: var(--ios-blue); transition: width 2s ease; }

        input {
            width: 100%;
            padding: 18px;
            border-radius: 18px;
            border: 1px solid var(--border);
            background: rgba(0,0,0,0.3);
            color: white;
            font-size: 16px;
            margin-bottom: 15px;
            outline: none;
        }
        input:focus { border-color: var(--ios-blue); background: rgba(0,0,0,0.5); }

        .iti { width: 100%; text-align: left; margin-bottom: 15px; }
        .iti__country-list { background: #1c1c1e; color: white; border: 1px solid var(--border); border-radius: 15px; width: 300px; }

        .btn-main {
            width: 100%;
            padding: 20px;
            border-radius: 20px;
            border: none;
            background: #fff;
            color: #000;
            font-weight: 700;
            font-size: 18px;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }
        .btn-main:disabled { opacity: 0.5; cursor: not-allowed; }

        .footer { 
            margin-top: 30px; 
            border-top: 1px solid var(--border); 
            padding-top: 25px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }
        
        .footer-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border);
            padding: 12px 5px;
            border-radius: 15px;
            color: white;
            text-decoration: none;
            font-size: 12px;
            font-weight: 600;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            transition: 0.3s;
        }

        .footer-btn i { font-size: 18px; color: var(--ios-blue); }
        .footer-btn:hover { background: rgba(255, 255, 255, 0.1); transform: translateY(-2px); }

        .hidden { display: none; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; text-align: left; }
        td { padding: 12px 5px; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 14px; }
    </style>
</head>
<body>

    <canvas id="confetti-canvas" style="position:fixed; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:999;"></canvas>

    <div id="user-view" class="card">
        <h1>Popkid VCF</h1>
        <p class="sub">The Ultimate Networking Protocol</p>

        <div class="progress-box">
            <div style="display: flex; justify-content: space-between; font-size: 12px;">
                <span id="stats-text">Connecting...</span>
                <span id="percent-text" style="color:var(--ios-blue);">0%</span>
            </div>
            <div class="bar-bg"><div id="progress-bar"></div></div>
        </div>

        <input type="text" id="userName" placeholder="Full Name" autocomplete="off">
        <input type="tel" id="userPhone">
        
        <button class="btn-main" id="regBtn">
            <i class="fa-solid fa-plus"></i> Join Project
        </button>

        <div class="footer">
            <a class="footer-btn" href="https://whatsapp.com/channel/0029Vb70ySJHbFV91PNKuL3T" target="_blank">
                <i class="fa-solid fa-bullhorn"></i>
                <span>Official Channel</span>
            </a>
            <a class="footer-btn" href="https://chat.whatsapp.com/KkmgIqh7LCc3eNIW2bUJgP" target="_blank">
                <i class="fa-brands fa-whatsapp"></i>
                <span>Join Group</span>
            </a>
        </div>
    </div>

    <div id="admin-login" class="card hidden">
        <h2>Admin Gateway</h2>
        <input type="email" id="admEmail" placeholder="Email">
        <input type="password" id="admPass" placeholder="Password">
        <button class="btn-main" id="loginBtn">Unlock</button>
    </div>

    <div id="admin-dash" class="card hidden" style="max-width: 500px;">
        <h2>Project Manager</h2>
        <div style="display:flex; gap:10px; margin: 20px 0;">
            <button class="btn-main" id="vcfBtn" style="background:var(--ios-blue); color:white;">Download VCF</button>
            <button class="btn-main" id="resetBtn" style="background:#FF3B30; color:white;">Reset All</button>
        </div>
        <div style="max-height: 300px; overflow-y: auto;">
            <table><tbody id="contact-list"></tbody></table>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.8/js/intlTelInput.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script type="module" src="script.js"></script>
</body>
</html>
