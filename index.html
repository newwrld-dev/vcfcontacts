<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POPKID VCF | Premium Project</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.8/css/intlTelInput.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --ios-blue: #007AFF;
            --glass: rgba(255, 255, 255, 0.08);
            --border: rgba(255, 255, 255, 0.15);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
            background: #000;
            background-image: radial-gradient(at 0% 0%, #1a1a2e 0, transparent 50%), 
                              radial-gradient(at 100% 100%, #0d0d1a 0, transparent 50%);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .card {
            background: var(--glass);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            border: 1px solid var(--border);
            border-radius: 35px;
            padding: 40px 25px;
            width: 100%;
            max-width: 420px;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.7);
        }

        h1 { font-size: 32px; font-weight: 800; margin-bottom: 5px; letter-spacing: -1px; }
        .sub { color: #8E8E93; font-size: 14px; margin-bottom: 25px; }

        /* Progress UI */
        .progress-box { background: rgba(255,255,255,0.03); padding: 20px; border-radius: 25px; margin-bottom: 25px; border: 1px solid rgba(255,255,255,0.05); }
        .bar-bg { background: #1c1c1e; height: 10px; border-radius: 5px; overflow: hidden; margin-top: 10px; }
        #progress-bar { width: 0%; height: 100%; background: var(--ios-blue); transition: width 2s ease; }

        /* Inputs */
        input {
            width: 100%;
            padding: 18px;
            border-radius: 18px;
            border: 1px solid var(--border);
            background: rgba(0,0,0,0.3);
            color: white;
            font-size: 16px;
            margin-bottom: 15px;
            outline: none;
        }
        input:focus { border-color: var(--ios-blue); background: rgba(0,0,0,0.5); }

        .iti { width: 100%; text-align: left; margin-bottom: 15px; }
        .iti__country-list { background: #1c1c1e; color: white; border: 1px solid var(--border); border-radius: 15px; width: 300px; }

        /* Button */
        .btn-main {
            width: 100%;
            padding: 20px;
            border-radius: 20px;
            border: none;
            background: #fff;
            color: #000;
            font-weight: 700;
            font-size: 18px;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }
        .btn-main:disabled { opacity: 0.5; cursor: not-allowed; }

        .footer { margin-top: 30px; border-top: 1px solid var(--border); padding-top: 20px; }
        .footer a { color: var(--ios-blue); text-decoration: none; font-size: 13px; margin: 0 10px; }

        .hidden { display: none; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; text-align: left; }
        td { padding: 12px 5px; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 14px; }
    </style>
</head>
<body>

    <div id="user-view" class="card">
        <h1>Popkid VCF</h1>
        <p class="sub">The Ultimate Networking Protocol</p>

        <div class="progress-box">
            <div style="display: flex; justify-content: space-between; font-size: 12px;">
                <span id="stats-text">Connecting...</span>
                <span id="percent-text" style="color:var(--ios-blue);">0%</span>
            </div>
            <div class="bar-bg"><div id="progress-bar"></div></div>
        </div>

        <input type="text" id="userName" placeholder="Full Name" autocomplete="off">
        <input type="tel" id="userPhone">
        
        <button class="btn-main" id="regBtn">
            <i class="fa-solid fa-plus"></i> Join Project
        </button>

        <div class="footer">
            <a href="https://whatsapp.com/channel/0029Vb70ySJHbFV91PNKuL3T">Official Channel</a>
            <a href="https://chat.whatsapp.com/KkmgIqh7LCc3eNIW2bUJgP">Join Group</a>
        </div>
    </div>

    <div id="admin-login" class="card hidden">
        <h2>Admin Gateway</h2>
        <input type="email" id="admEmail" placeholder="Email">
        <input type="password" id="admPass" placeholder="Password">
        <button class="btn-main" id="loginBtn">Unlock</button>
    </div>

    <div id="admin-dash" class="card hidden" style="max-width: 500px;">
        <h2>Project Manager</h2>
        <div style="display:flex; gap:10px; margin: 20px 0;">
            <button class="btn-main" id="vcfBtn" style="background:var(--ios-blue); color:white;">Download VCF</button>
            <button class="btn-main" id="resetBtn" style="background:#FF3B30; color:white;">Reset All</button>
        </div>
        <div style="max-height: 300px; overflow-y: auto;">
            <table><tbody id="contact-list"></tbody></table>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.8/js/intlTelInput.min.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, getDocs, query, where, getCountFromServer, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBp63fNtZKWKp9eG6lmVDORPYAqBxf3tfU",
            authDomain: "popkidvcf.firebaseapp.com",
            projectId: "popkidvcf",
            storageBucket: "popkidvcf.firebasestorage.app",
            messagingSenderId: "189477180127",
            appId: "1:189477180127:web:474daf37c233c61ec78f6a"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        // Setup Phone Input
        const phoneInput = window.intlTelInput(document.querySelector("#userPhone"), {
            initialCountry: "ke",
            separateDialCode: true,
            utilsScript: "https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.8/js/utils.js",
        });

        // Show Admin if URL has ?admin
        if (new URLSearchParams(window.location.search).has('admin')) {
            document.getElementById('user-view').classList.add('hidden');
            document.getElementById('admin-login').classList.remove('hidden');
        }

        // Live Progress Update
        async function updateProgress() {
            try {
                const snap = await getCountFromServer(collection(db, "contacts"));
                const count = snap.data().count;
                const goal = 1000;
                const perc = Math.min((count/goal*100), 100);
                document.getElementById('progress-bar').style.width = perc + "%";
                document.getElementById('percent-text').innerText = Math.round(perc) + "%";
                document.getElementById('stats-text').innerText = `${count} / ${goal} Members`;
            } catch (e) { document.getElementById('stats-text').innerText = "Live Server Ready"; }
        }
        updateProgress();

        // THE BUTTON FIX: Registration
        document.getElementById('regBtn').addEventListener('click', async function() {
            const name = document.getElementById('userName').value.trim();
            const phone = phoneInput.getNumber();
            const btn = this;

            if(!name || !phone) return alert("⚠️ Please enter Name and Number");
            
            btn.disabled = true;
            btn.innerText = "Securing Contact...";

            try {
                // Check if exists
                const q = query(collection(db, "contacts"), where("phone", "==", phone));
                const check = await getDocs(q);
                if(!check.empty) {
                    alert("❌ You are already registered!");
                    btn.disabled = false;
                    btn.innerText = "Join Project";
                    return;
                }

                // Add to DB
                await addDoc(collection(db, "contacts"), { name, phone, date: new Date() });
                alert("✅ Success! You have been added to the VCF.");
                location.reload();

            } catch (e) {
                alert("Database Error: " + e.message);
                btn.disabled = false;
                btn.innerText = "Join Project";
            }
        });

        // Admin Auth
        document.getElementById('loginBtn').addEventListener('click', async () => {
            try {
                await signInWithEmailAndPassword(auth, document.getElementById('admEmail').value, document.getElementById('admPass').value);
                document.getElementById('admin-login').classList.add('hidden');
                document.getElementById('admin-dash').classList.remove('hidden');
                loadContacts();
            } catch (e) { alert("Access Denied"); }
        });

        async function loadContacts() {
            const snap = await getDocs(collection(db, "contacts"));
            const tbody = document.getElementById('contact-list');
            tbody.innerHTML = "";
            snap.forEach(d => {
                tbody.innerHTML += `<tr><td>${d.data().name}</td><td>${d.data().phone}</td><td><i class="fas fa-trash" style="color:#FF3B30;cursor:pointer" onclick="window.del('${d.id}')"></i></td></tr>`;
            });
        }

        window.del = async (id) => { if(confirm("Delete?")) { await deleteDoc(doc(db,"contacts",id)); loadContacts(); } };

        document.getElementById('vcfBtn').addEventListener('click', async () => {
            const snap = await getDocs(collection(db, "contacts"));
            let vcf = "";
            snap.forEach(d => vcf += `BEGIN:VCARD\nVERSION:3.0\nFN:${d.data().name}\nTEL:${d.data().phone}\nEND:VCARD\n`);
            const a = document.createElement('a');
            a.href = URL.createObjectURL(new Blob([vcf], {type: "text/vcf"}));
            a.download = "Popkid_List.vcf"; a.click();
        });

        document.getElementById('resetBtn').addEventListener('click', async () => {
            if(confirm("WIPE ALL DATA?")) {
                const snap = await getDocs(collection(db, "contacts"));
                snap.forEach(async d => await deleteDoc(doc(db, "contacts", d.id)));
                alert("Wiped!"); loadContacts();
            }
        });
    </script>
</body>
</html>
