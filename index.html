<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POPKID VCF Project</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.8/css/intlTelInput.css">
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.1);
            --ios-blue: #0A84FF;
            --ios-red: #FF453A;
            --ios-green: #34C759;
            --bg: #000000;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica;
            background: var(--bg);
            color: white;
            margin: 0;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            background: var(--glass);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 35px;
            padding: 35px 20px;
            width: 100%;
            max-width: 400px;
            height: fit-content;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        h1 { font-weight: 700; font-size: 28px; margin-bottom: 5px; letter-spacing: -0.5px; }
        p.sub { color: #8E8E93; font-size: 14px; margin-bottom: 25px; }
        
        /* Progress Bar */
        .progress-container {
            background: rgba(255, 255, 255, 0.05);
            padding: 15px;
            border-radius: 20px;
            margin-bottom: 25px;
        }
        .bar-bg { background: rgba(255, 255, 255, 0.1); height: 10px; border-radius: 5px; overflow: hidden; margin: 10px 0; }
        #progress-bar { width: 0%; height: 100%; background: linear-gradient(90deg, #0A84FF, #5856D6); transition: width 1.5s ease; }
        
        /* Inputs */
        input {
            width: 100%;
            padding: 16px;
            margin: 10px 0;
            border-radius: 14px;
            border: none;
            background: rgba(255, 255, 255, 0.08);
            color: white;
            box-sizing: border-box;
            outline: none;
            font-size: 16px;
        }
        .iti { width: 100%; text-align: left; }
        
        /* Buttons */
        .btn { padding: 16px; border-radius: 16px; border: none; width: 100%; font-weight: 600; cursor: pointer; margin-top: 15px; font-size: 16px; transition: 0.2s; }
        .btn-blue { background: var(--ios-blue); color: white; }
        .btn-blue:active { transform: scale(0.98); opacity: 0.9; }
        .btn-red { background: var(--ios-red); color: white; }

        /* Socials */
        .social-box { margin-top: 30px; border-top: 1px solid rgba(255, 255, 255, 0.1); padding-top: 20px; }
        .social-box a { color: var(--ios-blue); text-decoration: none; font-size: 14px; display: block; margin: 12px 0; font-weight: 500; }

        /* Admin Table */
        table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 12px; }
        th { text-align: left; color: #8E8E93; padding-bottom: 10px; }
        td { padding: 10px 0; border-bottom: 1px solid rgba(255, 255, 255, 0.05); }
        .hidden { display: none; }
    </style>
</head>
<body>

<div id="user-view" class="container">
    <h1>VCF Project</h1>
    <p class="sub">By Popkid from Kenya</p>

    <div class="progress-container">
        <div class="bar-bg"><div id="progress-bar"></div></div>
        <small id="stats" style="color: var(--ios-blue);">Loading list status...</small>
    </div>

    <input type="text" id="userName" placeholder="Enter Full Name">
    <input type="tel" id="userPhone">
    <button class="btn btn-blue" id="regBtn">Add Me to VCF</button>

    <div class="social-box">
        <a href="https://whatsapp.com/channel/0029Vb70ySJHbFV91PNKuL3T">Follow Official Channel</a>
        <a href="https://chat.whatsapp.com/KkmgIqh7LCc3eNIW2bUJgP">Join WhatsApp Group</a>
    </div>
</div>

<div id="admin-login" class="container hidden">
    <h2>Admin Login</h2>
    <input type="email" id="admEmail" placeholder="iantaracha@gmail.com">
    <input type="password" id="admPass" placeholder="Password">
    <button class="btn btn-blue" id="loginBtn">Unlock Dashboard</button>
</div>

<div id="admin-dash" class="container hidden" style="max-width: 600px;">
    <h2>Dashboard</h2>
    <div style="display: flex; gap: 10px;">
        <button class="btn btn-blue" id="vcfBtn">📥 Download VCF</button>
        <button class="btn btn-red" id="resetBtn">⚠️ Reset All</button>
    </div>
    
    <table>
        <thead><tr><th>Name</th><th>Phone</th><th>Action</th></tr></thead>
        <tbody id="contact-list"></tbody>
    </table>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.8/js/intlTelInput.min.js"></script>
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, getDocs, query, where, getCountFromServer, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
    import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBp63fNtZKWKp9eG6lmVDORPYAqBxf3tfU",
        authDomain: "popkidvcf.firebaseapp.com",
        projectId: "popkidvcf",
        storageBucket: "popkidvcf.firebasestorage.app",
        messagingSenderId: "189477180127",
        appId: "1:189477180127:web:474daf37c233c61ec78f6a"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    // Initial Country Picker
    const phoneInput = window.intlTelInput(document.querySelector("#userPhone"), {
        initialCountry: "ke",
        separateDialCode: true,
        utilsScript: "https://cdnjs.cloudflare.com/ajax/libs/intl-tel-input/17.0.8/js/utils.js",
    });

    // Toggle Admin Mode via URL (?admin=true)
    const urlParams = new URLSearchParams(window.location.search);
    if (urlParams.has('admin')) {
        document.getElementById('user-view').classList.add('hidden');
        document.getElementById('admin-login').classList.remove('hidden');
    }

    // Live Progress Update
    async function updateStats() {
        const snapshot = await getCountFromServer(collection(db, "contacts"));
        const count = snapshot.data().count;
        const goal = 1000; // You can change this goal
        document.getElementById('progress-bar').style.width = Math.min((count/goal*100), 100) + "%";
        document.getElementById('stats').innerText = `${count} / ${goal} Contacts Successfully Added`;
    }
    updateStats();

    // Register User
    document.getElementById('regBtn').addEventListener('click', async () => {
        const name = document.getElementById('userName').value;
        const phone = phoneInput.getNumber();
        if(!name || !phone) return alert("Please enter both Name and Number");

        // Duplicate Check
        const q = query(collection(db, "contacts"), where("phone", "==", phone));
        const check = await getDocs(q);
        if(!check.empty) return alert("Error: This number is already in the VCF list!");

        await addDoc(collection(db, "contacts"), { name, phone, timestamp: new Date() });
        alert("✅ Successfully added to the VCF!");
        location.reload();
    });

    // Admin Login Logic
    document.getElementById('loginBtn').addEventListener('click', async () => {
        const email = document.getElementById('admEmail').value;
        const pass = document.getElementById('admPass').value;
        try {
            await signInWithEmailAndPassword(auth, email, pass);
            document.getElementById('admin-login').classList.add('hidden');
            document.getElementById('admin-dash').classList.remove('hidden');
            loadAdminData();
        } catch (e) { alert("Invalid Credentials"); }
    });

    async function loadAdminData() {
        const snap = await getDocs(collection(db, "contacts"));
        const list = document.getElementById('contact-list');
        list.innerHTML = "";
        snap.forEach(d => {
            const row = `<tr>
                <td>${d.data().name}</td>
                <td>${d.data().phone}</td>
                <td><button onclick="window.delContact('${d.id}')" style="color:var(--ios-red); background:none; border:none; cursor:pointer;">Delete</button></td>
            </tr>`;
            list.innerHTML += row;
        });
    }

    // Global delete for window
    window.delContact = async (id) => {
        if(confirm("Permanently delete this contact?")) {
            await deleteDoc(doc(db, "contacts", id));
            loadAdminData();
        }
    };

    // Export VCF File
    document.getElementById('vcfBtn').addEventListener('click', async () => {
        const snap = await getDocs(collection(db, "contacts"));
        let vcf = "";
        snap.forEach(d => {
            vcf += `BEGIN:VCARD\nVERSION:3.0\nFN:${d.data().name}\nTEL;TYPE=CELL:${d.data().phone}\nEND:VCARD\n`;
        });
        const blob = new Blob([vcf], {type: "text/vcf"});
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = "Popkid_Project_Contacts.vcf";
        a.click();
    });

    // Reset Project
    document.getElementById('resetBtn').addEventListener('click', async () => {
        if(confirm("WARNING: This will delete ALL contacts to start a new project. Continue?")) {
            const snap = await getDocs(collection(db, "contacts"));
            for (const d of snap.docs) { await deleteDoc(doc(db, "contacts", d.id)); }
            alert("Project Cleared!");
            loadAdminData();
        }
    });
</script>
</body>
</html>
